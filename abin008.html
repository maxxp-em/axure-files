<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服教程入口优化 — 交互原型</title>
<style>
:root {
  --brand: #7B5EA7;
  --brand-light: #9B7EC8;
  --brand-dim: #EDE7F6;
  --link: #1A6FD4;
  --bg: #EEEAF5;
  --text: #1A1A2E;
  --text-sec: #888;
  --green: #2E7D32;
  --green-bg: #E8F5E9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 12px 60px;
}

/* step nav */
.step-nav {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 30px;
  padding: 5px;
  gap: 2px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(123,94,167,0.12);
}
.step-btn {
  padding: 6px 14px;
  border-radius: 24px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sec);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  border: none;
  background: none;
  font-family: inherit;
}
.step-btn.active { background: var(--brand); color: #fff; font-weight: 700; }
.step-btn.done { color: var(--brand); }
.step-sep { color: #ccc; font-size: 11px; padding: 0 2px; }

.layout {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  width: 100%;
  max-width: 680px;
}

/* phone */
.phone-frame { flex-shrink: 0; width: 290px; }
.phone-shell {
  width: 290px;
  background: #1a1a2e;
  border-radius: 36px;
  padding: 10px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.28);
}
.phone-inner {
  border-radius: 28px;
  overflow: hidden;
  background: #fff;
  display: flex;
  flex-direction: column;
}

/* status bar — replaces notch */
.status-bar {
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px 4px;
  font-size: 10px;
  font-weight: 600;
  color: #1a1a2e;
  flex-shrink: 0;
  z-index: 5;
}
.status-time { font-size: 11px; font-weight: 700; }
.status-icons {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
}
.signal { display: flex; align-items: flex-end; gap: 1px; height: 10px; }
.signal span {
  display: inline-block;
  width: 2.5px;
  background: #1a1a2e;
  border-radius: 1px;
}
.battery {
  display: flex;
  align-items: center;
  gap: 1px;
}
.battery-body {
  width: 18px; height: 9px;
  border: 1.5px solid #1a1a2e;
  border-radius: 2px;
  padding: 1.5px 1.5px;
  position: relative;
}
.battery-fill {
  width: 72%;
  height: 100%;
  background: #1a1a2e;
  border-radius: 1px;
}
.battery-tip {
  width: 2px; height: 5px;
  background: #1a1a2e;
  border-radius: 0 1px 1px 0;
}

.phone-screen { display: none; flex-direction: column; }
.phone-screen.active { display: flex; animation: slideIn .25s ease; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(14px); }
  to   { opacity: 1; transform: translateX(0); }
}

.overlay-wrap { position: relative; width: 100%; }
.overlay-wrap img { width: 100%; display: block; }

.hotspot {
  position: absolute;
  cursor: pointer;
  border-radius: 6px;
  transition: background .15s;
}
.hotspot:hover { background: rgba(123,94,167,0.18); }
.hotspot.pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(123,94,167,0.55); }
  50%      { box-shadow: 0 0 0 8px rgba(123,94,167,0); }
}

.patch {
  position: absolute;
  pointer-events: none;
}

.new-copy {
  position: absolute;
  background: #fff;
  border-radius: 8px;
  padding: 11px 10px;
  font-size: 11.5px;
  color: var(--text);
  line-height: 1.85;
}
.new-copy .link {
  color: var(--link);
  text-decoration: underline;
  cursor: pointer;
  font-weight: 500;
}
.new-copy .link:hover { opacity: 0.7; }

/* side panel */
.side-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
}
.panel-card {
  background: #fff;
  border-radius: 14px;
  padding: 14px 16px;
  box-shadow: 0 2px 12px rgba(123,94,167,0.08);
}
.panel-card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-sec);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-card-title::before {
  content: '';
  width: 3px; height: 12px;
  background: var(--brand);
  border-radius: 2px;
  display: inline-block;
}
.info-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 8px;
}
.info-row:last-child { margin-bottom: 0; }
.info-icon { flex-shrink: 0; font-size: 13px; }
.info-text b { color: var(--brand); font-weight: 700; }
.tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 8px;
  vertical-align: middle;
  margin-left: 4px;
}
.tag-good { background: var(--green-bg); color: var(--green); }
.tag-new  { background: var(--brand-dim); color: var(--brand); }
.change-box {
  border-radius: 0 10px 10px 0;
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.75;
  color: var(--text);
}
.change-box.good {
  background: var(--green-bg);
  border-left: 3px solid var(--green);
}
.change-box.purple {
  background: var(--brand-dim);
  border-left: 3px solid var(--brand);
}

.divider {
  height: 1px;
  background: #F0EAF8;
  margin: 10px 0;
}

.impl-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 10px;
  font-size: 12px;
  line-height: 1.65;
  color: var(--text);
}
.impl-row:last-child { margin-bottom: 0; }
.impl-label {
  font-weight: 700;
  color: var(--brand);
  font-size: 11px;
  letter-spacing: 0.04em;
}

.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  padding: 9px 12px;
  border-radius: 24px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  border: none;
  transition: all .18s;
  min-width: 80px;
  text-align: center;
}
.btn-primary { background: var(--brand); color: #fff; box-shadow: 0 3px 12px rgba(123,94,167,0.3); }
.btn-primary:hover { background: var(--brand-light); }
.btn-ghost { background: none; color: var(--brand); border: 1.5px solid var(--brand); }
.btn-ghost:hover { background: var(--brand-dim); }

.hint {
  font-size: 11px;
  color: var(--text-sec);
  text-align: center;
  margin-top: 10px;
}

@media (max-width: 560px) {
  .layout { flex-direction: column; align-items: center; }
  .side-panel { width: 100%; max-width: 290px; }
}
</style>
</head>

function goTo(n) {
  document.querySelectorAll('.phone-screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  document.querySelectorAll('.step-btn').forEach((b,i) => {
    b.classList.remove('active','done');

    if (i+1 === n) b.classList.add('active');
  });

  document.getElementById('hint-text').textContent = hints[n];
}
